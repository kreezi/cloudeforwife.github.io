<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Звёздное небо ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0510;
            font-family: 'Georgia', 'Times New Roman', serif;
            user-select: none;
            touch-action: manipulation;
        }

        /* ===== НЕБО ===== */
        .sky {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(ellipse at 50% 30%, #1a0a20, #0a0510 70%);
            overflow: hidden;
        }

        /* ===== ПОДСКАЗКА СВЕРХУ ===== */
        .hint {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 50;
            text-align: center;
            padding: 18px 20px 14px;
            background: linear-gradient(180deg, rgba(10, 5, 16, 0.85) 0%, transparent 100%);
            pointer-events: none;
            animation: hintFadeIn 1.5s ease;
        }

        @keyframes hintFadeIn {
            0% {
                opacity: 0;
                transform: translateY(-20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hint .title {
            font-size: 1.1rem;
            color: #f5e6d3;
            letter-spacing: 1px;
            font-weight: 400;
        }

        .hint .title .highlight {
            color: #ffd700;
            font-weight: 700;
        }

        .hint .sub {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.35);
            margin-top: 4px;
            letter-spacing: 0.5px;
            font-style: italic;
        }

        .hint .sub span {
            display: inline-block;
            animation: pulseHint 2s ease-in-out infinite;
        }

        @keyframes pulseHint {
            0%,
            100% {
                transform: scale(1);
                opacity: 0.4;
            }
            50% {
                transform: scale(1.05);
                opacity: 0.8;
            }
        }

        /* ===== ЗВЁЗДЫ ===== */
        .star {
            position: absolute;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            touch-action: manipulation;
            will-change: transform, box-shadow;
        }

        .star::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 300%;
            height: 300%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(255, 255, 255, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }

        .star.active::after {
            opacity: 1;
            animation: glowPulse 1.5s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%,
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.3;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.3);
                opacity: 0.6;
            }
        }

        .star.active {
            box-shadow: 0 0 30px rgba(255, 215, 100, 0.6), 0 0 60px rgba(255, 215, 100, 0.3);
            animation: starPulse 1.5s ease-in-out infinite;
        }

        @keyframes starPulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
        }

        .star.twinkle {
            animation: twinkle var(--duration) ease-in-out infinite alternate;
        }

        @keyframes twinkle {
            0% {
                opacity: 0.2;
                transform: scale(0.8);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* ===== КОМПЛИМЕНТ ===== */
        .compliment-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: rgba(20, 10, 30, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 215, 150, 0.2);
            border-radius: 32px;
            padding: 32px 28px 28px;
            max-width: 360px;
            width: 90%;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8), 0 0 40px rgba(255, 200, 100, 0.05);
            text-align: center;
        }

        .compliment-popup.show {
            opacity: 1;
            pointer-events: auto;
            transform: translate(-50%, -50%) scale(1);
        }

        .compliment-popup .icon {
            font-size: 3.2rem;
            display: block;
            margin-bottom: 8px;
            animation: floatHeart 2.5s ease-in-out infinite;
        }

        @keyframes floatHeart {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-8px);
            }
        }

        .compliment-popup .text {
            font-size: 1.15rem;
            line-height: 1.7;
            color: #f5e6d3;
            margin-bottom: 16px;
            font-style: italic;
        }

        .compliment-popup .text .highlight {
            color: #ffd700;
            font-style: normal;
        }

        .compliment-popup .close-btn {
            padding: 10px 32px;
            background: linear-gradient(135deg, #d4737a, #b84a4a);
            border: none;
            border-radius: 40px;
            color: #fff;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            font-family: 'Georgia', serif;
            transition: all 0.3s ease;
            touch-action: manipulation;
            width: 100%;
        }

        .compliment-popup .close-btn:active {
            transform: scale(0.95);
        }

        .compliment-popup .close-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(212, 115, 122, 0.3);
        }

        /* ===== ПАДАЮЩАЯ ЗВЕЗДА ===== */
        .shooting-star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 6px 2px rgba(255, 255, 255, 0.4);
            animation: shoot linear forwards;
            opacity: 0;
        }

        .shooting-star::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 60px;
            height: 2px;
            background: linear-gradient(to left, rgba(255, 255, 255, 0.6), transparent);
            transform: translateX(100%);
        }

        @keyframes shoot {
            0% {
                opacity: 1;
                transform: translate(0, 0);
            }
            70% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translate(300px, 300px);
            }
        }

        /* ===== СЧЁТЧИК ===== */
        .star-count {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.8rem;
            font-family: 'Segoe UI', sans-serif;
            letter-spacing: 1px;
            z-index: 1;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.3);
            padding: 6px 16px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .star-count span {
            color: #ffd700;
        }

        /* ===== ЗАГРУЗОЧНЫЙ ЭКРАН ===== */
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #0a0510;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            transition: opacity 0.8s ease;
        }

        .loading.hide {
            opacity: 0;
            pointer-events: none;
        }

        .loading .spinner {
            font-size: 3rem;
            animation: spin 1.5s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        /* ===== СНЕЖИНКИ / ЗВЁЗДОЧКИ (ДОП ФОН) ===== */
        .sparkle {
            position: absolute;
            font-size: 0.6rem;
            opacity: 0.03;
            animation: sparkleFloat linear infinite;
            pointer-events: none;
        }

        @keyframes sparkleFloat {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.03;
            }
            90% {
                opacity: 0.03;
            }
            100% {
                transform: translateY(-10vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* ===== АДАПТИВ ===== */
        @media (max-width: 480px) {
            .hint .title {
                font-size: 0.95rem;
            }
            .hint .sub {
                font-size: 0.7rem;
            }
            .compliment-popup {
                padding: 24px 20px 24px;
                max-width: 320px;
                border-radius: 28px;
            }
            .compliment-popup .icon {
                font-size: 2.6rem;
            }
            .compliment-popup .text {
                font-size: 1rem;
                line-height: 1.6;
            }
            .compliment-popup .close-btn {
                font-size: 0.85rem;
                padding: 12px 24px;
            }
            .star-count {
                font-size: 0.7rem;
                padding: 4px 12px;
                bottom: 20px;
            }
        }

        @media (max-width: 380px) {
            .hint .title {
                font-size: 0.85rem;
            }
            .hint .sub {
                font-size: 0.65rem;
            }
            .compliment-popup {
                padding: 20px 16px 20px;
                max-width: 280px;
            }
            .compliment-popup .text {
                font-size: 0.9rem;
            }
        }

        @media (orientation: landscape) and (max-height: 500px) {
            .hint {
                padding: 10px 16px 8px;
            }
            .hint .title {
                font-size: 0.85rem;
            }
            .hint .sub {
                font-size: 0.65rem;
                margin-top: 2px;
            }
            .compliment-popup {
                max-width: 300px;
                padding: 20px 18px 20px;
            }
            .compliment-popup .icon {
                font-size: 2rem;
            }
            .compliment-popup .text {
                font-size: 0.9rem;
                margin-bottom: 12px;
            }
            .compliment-popup .close-btn {
                padding: 8px 20px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>

            //  ПЕРЕМЕШИВАЕМ КОМПЛИМЕНТЫ
            // =============================================
            function shuffleArray(arr) {
                const shuffled = [...arr];
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
                return shuffled;
            }

            const shuffledCompliments = shuffleArray(compliments);

            // =============================================
            //  СОЗДАНИЕ ЗВЁЗД
            // =============================================
            const sky = document.getElementById('sky');
            const starCountEl = document.getElementById('starCount');
            const totalStarsEl = document.getElementById('totalStars');

            const starCount = Math.min(shuffledCompliments.length, 80);
            totalStarsEl.textContent = starCount;

            let openedStars = 0;
            const starElements = [];

            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star twinkle';

                const size = 4 + Math.random() * 12;
                const x = 5 + Math.random() * 90;
                const y = 5 + Math.random() * 85;

                star.style.height = size + 'px';
                star.style.left = x + '%';
                star.style.top = y + '%';

                    e.stopPropagation();

                    if (this.classList.contains('active')) return;

                    this.classList.remove('twinkle');
                    this.classList.add('active');

                    const index = parseInt(this.dataset.index);
                    const compliment = shuffledCompliments[index % shuffledCompliments.length];

                    showCompliment(compliment.icon, compliment.text);

                    openedStars++;
                    starCountEl.textContent = openedStars;

                    // Создаём эффект искры
                    createSparks(this);

                    // Вибрация на телефоне
                    if (navigator.vibrate) {
                        navigator.vibrate(15);
                    }
                });

                sky.appendChild(star);
                starElements.push(star);

                // Добавляем случайные блестящие точки

                    const sparkle = document.createElement('span');
                    sparkle.className = 'sparkle';
                    sparkle.textContent = '✦';
                    sparkle.style.left = Math.random() * 100 + '%';
                    sparkle.style.top = Math.random() * 100 + '%';
                    sparkle.style.fontSize = (0.4 + Math.random() * 0.8) + 'rem';
                    sparkle.style.animationDuration = (15 + Math.random() * 20) + 's';
                    sparkle.style.animationDelay = (Math.random() * 15) + 's';

            //  ПОКАЗ КОМПЛИМЕНТА

            const popup = document.getElementById('popup');
            const popupIcon = document.getElementById('popupIcon');
            const popupText = document.getElementById('popupText');
            const popupClose = document.getElementById('popupClose');

            let isPopupOpen = false;

            function showCompliment(icon, text) {
                if (isPopupOpen) return;

                popupIcon.textContent = icon || '💫';
                popupText.innerHTML = text;

                // Добавляем случайный highlight
                const words = text.split(' ');
                if (words.length > 3) {
                    const idx = Math.floor(Math.random() * words.length);
                    words[idx] = '<span class="highlight">' + words[idx] + '</span>';
                    popupText.innerHTML = words.join(' ');
                }

                popup.classList.add('show');
                isPopupOpen = true;
            }

            function hidePopup() {
                popup.classList.remove('show');
                isPopupOpen = false;
            }

            popupClose.addEventListener('click', function(e) {
                e.preventDefault();
                hidePopup();
            });

            // Клик вне попапа
            popup.addEventListener('click', function(e) {
                if (e.target === this) {
                    hidePopup();
                }
            });

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    hidePopup();
                }
            });

            // =============================================
            //  ЭФФЕКТ ИСКРЫ ПРИ КЛИКЕ
            // =============================================
            function createSparks(element) {
                const rect = element.getBoundingClientRect();
                const cx = rect.left + rect.width / 2;
                const cy = rect.top + rect.height / 2;

                const colors = ['#ffd700', '#ff6b6b', '#ff9ff3', '#feca57', '#fff'];
                for (let i = 0; i < 6; i++) {
                    const spark = document.createElement('div');
                    spark.style.position = 'fixed';
                    spark.style.width = (3 + Math.random() * 6) + 'px';
                    spark.style.height = spark.style.width;
                    spark.style.background = colors[Math.floor(Math.random() * colors.length)];
                    spark.style.borderRadius = '50%';
                    spark.style.pointerEvents = 'none';
                    spark.style.zIndex = '50';
                    spark.style.left = cx + 'px';
                    spark.style.top = cy + 'px';
                    spark.style.boxShadow = '0 0 10px rgba(255, 215, 0, 0.3)';

                    const angle = Math.random() * Math.PI * 2;
                    const distance = 30 + Math.random() * 60;
                    const dx = Math.cos(angle) * distance;
                    const dy = Math.sin(angle) * distance - 20;

                    spark.style.transition = 'all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)';
                    document.body.appendChild(spark);

                    requestAnimationFrame(() => {
                        spark.style.transform = `translate(${dx}px, ${dy}px) scale(0)`;
                        spark.style.opacity = '0';
                    });

                    setTimeout(() => {
                        spark.remove();
                    }, 700);
                }
            }

            // =============================================
            //  ПАДАЮЩАЯ ЗВЕЗДА (периодически)
            // =============================================
            function createShootingStar() {
                const star = document.createElement('div');
                star.className = 'shooting-star';
                const x = Math.random() * 70;
                const y = Math.random() * 30;
                star.style.left = x + '%';
                star.style.top = y + '%';
                star.style.animationDuration = (0.8 + Math.random() * 1.2) + 's';
                star.style.width = (2 + Math.random() * 3) + 'px';
                star.style.height = star.style.width;

                sky.appendChild(star);

                setTimeout(() => {
                    star.remove();
                }, 2500);
            }

            // Первая звезда через 3 секунды
            setTimeout(() => {
                createShootingStar();
            }, 3000);

            // И дальше каждые 5-12 секунд
            setInterval(() => {
                if (Math.random() > 0.4) {
                    createShootingStar();
                }
            }, 7000);

            // =============================================
            //  УБИРАЕМ ЗАГРУЗКУ
            // =============================================
            setTimeout(() => {
                document.getElementById('loading').classList.add('hide');
            }, 600);

            // =============================================
            //  АДАПТАЦИЯ
            // =============================================
            let resizeTimer;
            window.addEventListener('resize', function() {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(() => {}, 500);
            });

            console.log('⭐ Звёздное небо готово! ❤️');
        })();
    </script>
</body>
</html>
