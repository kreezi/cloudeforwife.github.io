<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>Облако комплиментов для тебя ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #1a0b0b;
            background-image: radial-gradient(ellipse at 30% 20%, rgba(200, 80, 80, 0.25) 0%, transparent 60%),
                              radial-gradient(ellipse at 70% 80%, rgba(180, 60, 60, 0.20) 0%, transparent 55%),
                              radial-gradient(ellipse at 50% 100%, rgba(140, 50, 50, 0.30) 0%, transparent 45%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Georgia', 'Times New Roman', serif;
            position: relative;
            height: 100vh;
            width: 100vw;
        }

        /* ===== ОБЛАКО КОМПЛИМЕНТОВ ===== */
        .cloud-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .compliment-word {
            position: absolute;
            font-weight: 700;
            user-select: none;
            white-space: nowrap;
            font-family: 'Georgia', serif;
            text-shadow: 0 0 40px rgba(255, 100, 100, 0.15);
            transition: transform 0.3s ease, opacity 0.3s ease;
            animation: floatCloud linear infinite;
        }

        .compliment-word:hover {
            transform: scale(1.4) !important;
            opacity: 0.9 !important;
            cursor: default;
            z-index: 10;
        }

        @keyframes floatCloud {
            0% {
                transform: translateX(-20vw) rotate(-10deg) scale(0.6);
                opacity: 0;
            }
            5% {
                opacity: 0.4;
            }
            95% {
                opacity: 0.4;
            }
            100% {
                transform: translateX(120vw) rotate(10deg) scale(1.1);
                opacity: 0;
            }
        }

        /* ===== ПАДАЮЩИЕ СЕРДЕЧКИ ===== */
        .hearts-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .heart-float {
            position: absolute;
            font-size: 1.4rem;
            opacity: 0.12;
            animation: fall linear infinite;
            user-select: none;
        }

        @keyframes fall {
            0% {
                transform: translateY(-10vh) rotate(0deg) scale(0.5);
                opacity: 0;
            }
            10% {
                opacity: 0.15;
            }
            90% {
                opacity: 0.15;
            }
            100% {
                transform: translateY(110vh) rotate(720deg) scale(1.3);
                opacity: 0;
            }
        }

        /* ===== ЦЕНТРАЛЬНАЯ КАРТОЧКА ===== */
        .center-card {
            position: relative;
            z-index: 2;
            max-width: 480px;
            width: 90%;
            background: rgba(255, 248, 245, 0.92);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 60px;
            padding: 48px 36px 44px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.60),
                        0 0 0 1px rgba(255, 200, 180, 0.10),
                        inset 0 1px 0 rgba(255,255,255,0.5);
            border: 1px solid rgba(255, 215, 200, 0.20);
            text-align: center;
            animation: fadeInUp 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(60px) scale(0.92);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .center-card .icon-top {
            font-size: 4.2rem;
            display: block;
            margin-bottom: 6px;
            animation: floatHeart 3.6s ease-in-out infinite;
        }

        @keyframes floatHeart {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-14px) scale(1.05); }
        }

        .center-card h1 {
            font-size: 2.2rem;
            color: #2a1212;
            margin-bottom: 6px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .center-card h1 .accent {
            background: linear-gradient(135deg, #c0392b, #e85a5a, #c0392b);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmerText 5s ease-in-out infinite;
        }

        @keyframes shimmerText {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .center-card .sub {
            font-size: 1.05rem;
            color: #7a4a4a;
            font-style: italic;
            margin-bottom: 18px;
            border-top: 1px solid rgba(200, 160, 160, 0.15);
            padding-top: 14px;
            display: inline-block;
        }

        .center-card .sub span {
            display: inline-block;
            animation: pulseHeart 2s ease-in-out infinite;
        }

        @keyframes pulseHeart {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .center-card .message {
            font-size: 1rem;
            line-height: 1.8;
            color: #3d2222;
            background: rgba(255, 240, 235, 0.30);
            padding: 18px 20px;
            border-radius: 30px;
            border-left: 3px solid #d4737a;
            margin-bottom: 20px;
            font-style: italic;
        }

        .center-card .message .heart {
            color: #d4737a;
        }

        .btn-hearts {
            padding: 14px 40px;
            background: linear-gradient(135deg, #d4737a, #b84a4a, #d4737a);
            background-size: 200% 200%;
            border: none;
            border-radius: 60px;
            color: #fff;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 10px 36px rgba(212, 115, 122, 0.28);
            font-family: 'Georgia', serif;
            animation: btnGlow 4s ease-in-out infinite;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        @keyframes btnGlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .btn-hearts:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 16px 48px rgba(212, 115, 122, 0.35);
        }

        .btn-hearts:active {
            transform: translateY(0) scale(0.97);
        }

        .btn-hearts.secondary {
            background: linear-gradient(135deg, #b84a4a, #8a2a2a, #b84a4a);
            margin-top: 12px;
        }

        .response-message {
            margin-top: 18px;
            padding: 16px 20px;
            background: linear-gradient(145deg, #f0f7ee, #e6f0e4);
            border-radius: 40px;
            border: 1px solid rgba(100, 200, 120, 0.12);
            display: none;
            animation: fadePop 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
            font-size: 1.05rem;
            color: #1a4a1a;
        }

        .response-message.show {
            display: block;
        }

        @keyframes fadePop {
            0% { opacity: 0; transform: scale(0.92) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .response-message .big {
            font-size: 2.6rem;
            display: block;
            margin-bottom: 4px;
        }

        .footer {
            margin-top: 22px;
            font-size: 0.85rem;
            color: #8a6a6a;
            border-top: 1px solid rgba(200, 160, 160, 0.10);
            padding-top: 18px;
            font-style: italic;
            letter-spacing: 0.3px;
        }

        .footer span {
            animation: pulseHeart 2.6s ease-in-out infinite;
            display: inline-block;
        }

        @media (max-width: 480px) {
            .center-card {
                padding: 32px 20px 32px;
                border-radius: 44px;
                width: 95%;
            }
            .center-card h1 {
                font-size: 1.7rem;
            }
            .center-card .icon-top {
                font-size: 3.4rem;
            }
            .center-card .message {
                font-size: 0.9rem;
                padding: 14px 16px;
            }
            .btn-hearts {
                font-size: 1rem;
                padding: 14px 24px;
            }
            .compliment-word {
                font-size: 1.2rem !important;
            }
        }

        @media (max-width: 380px) {
            .center-card h1 {
                font-size: 1.4rem;
            }
            .center-card .sub {
                font-size: 0.9rem;
            }
            .compliment-word {
                font-size: 1rem !important;
            }
        }
    </style>
</head>
<body>

    <!-- ОБЛАКО КОМПЛИМЕНТОВ -->
    <div class="cloud-container" id="cloudContainer"></div>

    <!-- ПАДАЮЩИЕ СЕРДЕЧКИ -->
    <div class="hearts-bg" id="heartsBg"></div>

    <!-- ЦЕНТРАЛЬНАЯ КАРТОЧКА -->
    <div class="center-card">
        <span class="icon-top">💫</span>
        <h1>Облако <span class="accent">комплиментов</span></h1>
        <div class="sub">Для моей <span>❤️</span> любимой жены</div>

        <div class="message">
            <span class="heart">💖</span>
            Каждое слово в этом облаке — о тебе.
            <br>
            Просто смотри и улыбайся.
            <br><br>
            <span style="font-size: 0.9rem; opacity: 0.7;">(наведи на слово — оно увеличится)</span>
        </div>

        <button class="btn-hearts" id="loveBtn">
            <span>💝</span> Показать ещё любви <span>💝</span>
        </button>

        <button class="btn-hearts secondary" id="goToInviteBtn">
            <span>💌</span> Перейти к приглашению <span>💌</span>
        </button>

        <div class="response-message" id="responseMessage">
            <span class="big">🥰</span>
            Ты — самое прекрасное, что есть в моей жизни!
            <br>
            <span style="font-size: 0.9rem; opacity: 0.7;">Облако обновилось специально для тебя ❤️</span>
        </div>

        <div class="footer">
            <span>🌹</span> Навсегда твой <span>🌹</span>
        </div>
    </div>

    <script>
        (function() {
            // =============================================
            //  МАССИВ КОМПЛИМЕНТОВ
            // =============================================
            const complimentsList = [
                '❤️ Любимая',
                '⭐ Ты — моя звезда',
                '💖 Самая красивая',
                '✨ Ты — свет',
                '🌺 Прекрасная',
                '💕 Моя радость',
                '🌟 Самая лучшая',
                '💗 Неповторимая',
                '🌸 Нежная как цветок',
                '❤️ Ты — моё сердце',
                '✨ Солнышко',
                '💖 Моя муза',
                '⭐ Ты — мечта',
                '💕 Единственная',
                '❤️ Моя гордость',
                '✨ Великолепная',
                '💖 Моя жизнь',
                '⭐ Неотразимая',
                '🌸 Идеальная',
                '💕 Потрясающая',
                '❤️ Божественная',
                '✨ Невероятная',
                '💖 Моя королева',
                '⭐ Самая нежная',
                '🌸 Обаятельная',
                '💕 Сияющая',
                '❤️ Родная',
                '✨ Удивительная',
                '💖 Мой ангел',
                '⭐ Чудесная',
                '🌸 Вдохновение',
                '💕 Самая добрая',
                '❤️ Лучик света',
                '✨ Магия',
                '💖 Страсть моя',
                '⭐ Лучшая жена',
                '🌸 Моя вселенная',
                '💕 Ты — воздух',
                '❤️ Моя сказка',
                '✨ Яркая',
                '💖 Искренняя',
                '⭐ Мой мир',
                '🌸 Теплая',
                '💕 Ласковая',
                '❤️ Лучшая подруга',
                '✨ Моя сила',
                '💖 Крылья',
                '⭐ Надежда',
                '🌸 Уютная',
                '💕 Родная душа',
                '❤️ Красота',
                '✨ Счастье',
                '💖 Моя отрада',
                '⭐ Мой цветочек',
                '🌸 Моя конфетка',
                '💕 Моя булочка',
                '❤️ Лучшая жена на свете',
                '✨ Ты — идеальная жена',
                '💖 Я горжусь тобой',
                '⭐ С тобой я стал лучше',
                '🌸 Ты делаешь меня счастливым',
                '💕 Ты — моя опора',
                '❤️ Ты — моя поддержка',
                '✨ Спасибо, что ты есть',
                '💖 Ты — лучший подарок судьбы',
                '⭐ Я каждый день влюбляюсь в тебя заново',
                '🌸 Ты — моя главная награда',
                '💕 Ты — моя победа',
                '❤️ Ты — мой тыл',
                '✨ Ты — мой фронт',
                '💖 Без тебя я никто',
                '⭐ Ты — мой компас',
                '🌸 Ты — мой путь',
                '💕 Ты — мой рассвет',
                '❤️ Ты — мой закат',
                '✨ Ты — моя весна',
                '💖 Ты — моё лето',
                '⭐ Ты — моя осень',
                '🌸 Ты — моя зима',
                '💕 Ты — мой день',
                '❤️ Ты — моя ночь',
                '✨ Ты — моя планета',
                '💖 Ты — моя галактика',
                '⭐ Ты — всё',
                '🌸 Ты — космос',
                '💕 Ты — магия',
                '❤️ Ты — свет',
                '✨ Ты — тепло',
                '💖 Ты — нежность',
                '⭐ Ты — страсть',
                '🌸 Ты — жизнь',
                '💕 Ты — мир',
                '❤️ Ты — сон',
                '✨ Ты — явь',
                '💖 Ты — луч',
                '⭐ Ты — огонь',
                '🌸 Ты — вода',
                '💕 Моя любимая жена',
                '❤️ Ты — моя богиня',
                '✨ Ты — моя фея',
                '💖 Ты — моя звёздочка',
                '⭐ Ты — моя ягодка',
                '🌸 Ты — моя сладость',
                '💕 Ты — мой пряник',
                '❤️ Ты — мой пирожок',
                '✨ Ты — мой зефир',
                '💖 Ты — моя мармеладка'
            ];

            // =============================================
            //  ГЕНЕРАЦИЯ ОБЛАКА
            // =============================================
            function generateCloud(words) {
                const container = document.getElementById('cloudContainer');
                container.innerHTML = '';

                // Перемешиваем
                const shuffled = [...words];
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }

                // Берём только первые 80 слов, чтобы не перегружать
                const selected = shuffled.slice(0, 80);

                selected.forEach((word) => {
                    const el = document.createElement('span');
                    el.className = 'compliment-word';
                    el.textContent = word;

                    // Случайное положение
                    const top = 2 + Math.random() * 94;
                    el.style.top = top + '%';

                    // Случайный размер
                    const size = 1.2 + Math.random() * 2.8;
                    el.style.fontSize = size + 'rem';

                    // Случайная задержка
                    const delay = Math.random() * 20;
                    el.style.animationDelay = delay + 's';

                    // Случайная скорость
                    const duration = 22 + Math.random() * 28;
                    el.style.animationDuration = duration + 's';

                    // Случайная прозрачность
                    el.style.opacity = 0.15 + Math.random() * 0.35;

                    // Случайный поворот
                    const rotation = -12 + Math.random() * 24;
                    el.style.transform = `rotate(${rotation}deg)`;

                    // Случайный цвет
                    const hue = 330 + Math.random() * 30;
                    const lightness = 55 + Math.random() * 30;
                    el.style.color = `hsla(${hue}, 75%, ${lightness}%, 0.45)`;

                    container.appendChild(el);
                });

                console.log('✨ Облако обновлено! Количество слов:', selected.length);
            }

            // =============================================
            //  ПАДАЮЩИЕ СЕРДЕЧКИ
            // =============================================
            function createHearts() {
                const container = document.getElementById('heartsBg');
                const emojis = ['❤️', '♥️', '💕', '💖', '🌸', '✨'];
                for (let i = 0; i < 30; i++) {
                    const el = document.createElement('span');
                    el.className = 'heart-float';
                    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                    el.style.left = Math.random() * 100 + '%';
                    el.style.fontSize = (0.8 + Math.random() * 1.6) + 'rem';
                    el.style.animationDuration = (15 + Math.random() * 25) + 's';
                    el.style.animationDelay = (Math.random() * 20) + 's';
                    container.appendChild(el);
                }
            }

            // =============================================
            //  ИНИЦИАЛИЗАЦИЯ
            // =============================================
            let currentCompliments = [...complimentsList];
            generateCloud(currentCompliments);
            createHearts();

            console.log('❤️ Облако комплиментов загружено! Количество комплиментов:', currentCompliments.length);

            // =============================================
            //  КНОПКА "ПОКАЗАТЬ ЕЩЁ ЛЮБВИ"
            // =============================================
            const loveBtn = document.getElementById('loveBtn');
            const goToInviteBtn = document.getElementById('goToInviteBtn');
            const responseMessage = document.getElementById('responseMessage');

            loveBtn.addEventListener('click', function(e) {
                e.preventDefault();

                // Перемешиваем и обновляем
                const shuffled = [...currentCompliments];
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
                currentCompliments = shuffled;
                generateCloud(currentCompliments);

                // Показываем сообщение
                responseMessage.classList.add('show');
                responseMessage.scrollIntoView({ behavior: 'smooth', block: 'center' });

                if (navigator.vibrate) {
                    navigator.vibrate(20);
                }

                const messages = [
                    '💕 Ещё немного любви',
                    '❤️ Ты этого достойна',
                    '💖 Бесконечная любовь',
                    '🌹 Ты — моё всё',
                    '✨ Ты сияешь',
                    '💝 Люблю тебя!'
                ];
                loveBtn.innerHTML = `💕 ${messages[Math.floor(Math.random() * messages.length)]}`;

                setTimeout(() => {
                    responseMessage.classList.remove('show');
                }, 4000);
            });

            // =============================================
            //  КНОПКА "ПЕРЕЙТИ К ПРИГЛАШЕНИЮ"
            // =============================================
            goToInviteBtn.addEventListener('click', function(e) {
                e.preventDefault();
                this.innerHTML = '⏳ Загрузка...';
                this.disabled = true;

                setTimeout(() => {
                    // Если приглашение в файле invite.html
                    window.location.href = 'invite.html';
                    // Если приглашение в index.html (главная) — раскомментировать:
                    // window.location.href = '/';
                }, 800);
            });

            // =============================================
            //  АДАПТАЦИЯ ПРИ ИЗМЕНЕНИИ РАЗМЕРА
            // =============================================
            let resizeTimeout;
            window.addEventListener('resize', function() {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(() => {
                    generateCloud(currentCompliments);
                }, 600);
            });

            console.log('❤️ Всё готово! Облако комплиментов работает!');
        })();
    </script>
</body>
</html>
