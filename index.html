<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>Облако комплиментов для тебя ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #1a0b0b;
            background-image: radial-gradient(ellipse at 30% 20%, rgba(200, 80, 80, 0.25) 0%, transparent 60%),
                              radial-gradient(ellipse at 70% 80%, rgba(180, 60, 60, 0.20) 0%, transparent 55%),
                              radial-gradient(ellipse at 50% 100%, rgba(140, 50, 50, 0.30) 0%, transparent 45%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Georgia', 'Times New Roman', serif;
            position: relative;
        }

        /* ===== ОБЛАКО КОМПЛИМЕНТОВ ===== */
        .cloud-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .compliment-word {
            position: absolute;
            font-weight: 700;
            user-select: none;
            white-space: nowrap;
            animation: floatCloud linear infinite;
            font-family: 'Georgia', serif;
            text-shadow: 0 0 40px rgba(255, 100, 100, 0.15);
            transition: transform 0.3s ease;
        }

        /* При наведении — увеличиваются */
        .compliment-word:hover {
            transform: scale(1.3) !important;
            opacity: 0.9 !important;
            transition: transform 0.3s ease, opacity 0.3s ease;
            cursor: default;
        }

        @keyframes floatCloud {
            0% {
                transform: translateX(-15vw) rotate(-8deg) scale(0.7);
                opacity: 0.05;
            }
            8% {
                opacity: 0.4;
            }
            92% {
                opacity: 0.4;
            }
            100% {
                transform: translateX(115vw) rotate(8deg) scale(1.2);
                opacity: 0.05;
            }
        }

        /* Разные скорости */
        .compliment-word:nth-child(odd) {
            animation-duration: 28s;
        }
        .compliment-word:nth-child(even) {
            animation-duration: 38s;
        }
        .compliment-word:nth-child(3n) {
            animation-duration: 32s;
        }
        .compliment-word:nth-child(5n) {
            animation-duration: 45s;
        }
        .compliment-word:nth-child(7n) {
            animation-duration: 25s;
        }

        /* ===== ПАДАЮЩИЕ СЕРДЕЧКИ (фон) ===== */
        .hearts-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .heart-float {
            position: absolute;
            font-size: 1.4rem;
            opacity: 0.12;
            animation: fall linear infinite;
            user-select: none;
        }

        @keyframes fall {
            0% {
                transform: translateY(-10vh) rotate(0deg) scale(0.5);
                opacity: 0.05;
            }
            50% {
                opacity: 0.2;
            }
            100% {
                transform: translateY(110vh) rotate(720deg) scale(1.3);
                opacity: 0;
            }
        }

        /* ===== ЦЕНТРАЛЬНАЯ КАРТОЧКА ===== */
        .center-card {
            position: relative;
            z-index: 2;
            max-width: 480px;
            width: 90%;
            background: rgba(255, 248, 245, 0.92);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 60px;
            padding: 48px 36px 44px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.60),
                        0 0 0 1px rgba(255, 200, 180, 0.10),
                        inset 0 1px 0 rgba(255,255,255,0.5);
            border: 1px solid rgba(255, 215, 200, 0.20);
            text-align: center;
            animation: fadeInUp 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(60px) scale(0.92);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .center-card .icon-top {
            font-size: 4.2rem;
            display: block;
            margin-bottom: 6px;
            animation: floatHeart 3.6s ease-in-out infinite;
        }

        @keyframes floatHeart {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-14px) scale(1.05); }
        }

        .center-card h1 {
            font-size: 2.2rem;
            color: #2a1212;
            margin-bottom: 6px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .center-card h1 .accent {
            background: linear-gradient(135deg, #c0392b, #e85a5a, #c0392b);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmerText 5s ease-in-out infinite;
        }

        @keyframes shimmerText {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .center-card .sub {
            font-size: 1.05rem;
            color: #7a4a4a;
            font-style: italic;
            margin-bottom: 18px;
            border-top: 1px solid rgba(200, 160, 160, 0.15);
            padding-top: 14px;
            display: inline-block;
        }

        .center-card .sub span {
            display: inline-block;
            animation: pulseHeart 2s ease-in-out infinite;
        }

        @keyframes pulseHeart {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .center-card .message {
            font-size: 1rem;
            line-height: 1.8;
            color: #3d2222;
            background: rgba(255, 240, 235, 0.30);
            padding: 18px 20px;
            border-radius: 30px;
            border-left: 3px solid #d4737a;
            margin-bottom: 20px;
            font-style: italic;
        }

        .center-card .message .heart {
            color: #d4737a;
        }

        .btn-hearts {
            padding: 14px 40px;
            background: linear-gradient(135deg, #d4737a, #b84a4a, #d4737a);
            background-size: 200% 200%;
            border: none;
            border-radius: 60px;
            color: #fff;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 10px 36px rgba(212, 115, 122, 0.28);
            font-family: 'Georgia', serif;
            animation: btnGlow 4s ease-in-out infinite;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        @keyframes btnGlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .btn-hearts:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 16px 48px rgba(212, 115, 122, 0.35);
        }

        .btn-hearts:active {
            transform: translateY(0) scale(0.97);
        }

        .btn-hearts:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .response-message {
            margin-top: 18px;
            padding: 16px 20px;
            background: linear-gradient(145deg, #f0f7ee, #e6f0e4);
            border-radius: 40px;
            border: 1px solid rgba(100, 200, 120, 0.12);
            display: none;
            animation: fadePop 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
            font-size: 1.05rem;
            color: #1a4a1a;
        }

        .response-message.show {
            display: block;
        }

        @keyframes fadePop {
            0% { opacity: 0; transform: scale(0.92) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .response-message .big {
            font-size: 2.6rem;
            display: block;
            margin-bottom: 4px;
        }

        .footer {
            margin-top: 22px;
            font-size: 0.85rem;
            color: #8a6a6a;
            border-top: 1px solid rgba(200, 160, 160, 0.10);
            padding-top: 18px;
            font-style: italic;
            letter-spacing: 0.3px;
        }

        .footer span {
            animation: pulseHeart 2.6s ease-in-out infinite;
            display: inline-block;
        }

        /* ===== АДАПТИВ ===== */
        @media (max-width: 480px) {
            .center-card {
                padding: 32px 20px 32px;
                border-radius: 44px;
                width: 95%;
            }
            .center-card h1 {
                font-size: 1.7rem;
            }
            .center-card .icon-top {
                font-size: 3.4rem;
            }
            .center-card .message {
                font-size: 0.9rem;
                padding: 14px 16px;
            }
            .btn-hearts {
                font-size: 1rem;
                padding: 14px 24px;
            }
            .compliment-word {
                font-size: 1.2rem !important;
            }
        }

        @media (max-width: 380px) {
            .center-card h1 {
                font-size: 1.4rem;
            }
            .center-card .sub {
                font-size: 0.9rem;
            }
            .compliment-word {
                font-size: 1rem !important;
            }
        }
    </style>
</head>
<body>

    <!-- ===== ОБЛАКО КОМПЛИМЕНТОВ ===== -->

    <!-- ===== ЦЕНТРАЛЬНАЯ КАРТОЧКА ===== -->

            ];

            // =============================================
            //  ГЕНЕРАЦИЯ ОБЛАКА
            // =============================================
            function generateCloud(words) {
                const container = document.getElementById('cloudContainer');
                container.innerHTML = '';

                // Перемешиваем слова
                const shuffled = [...words];
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }

                shuffled.forEach((word, index) => {
                    const el = document.createElement('span');
                    el.className = 'compliment-word';
                    el.textContent = word;

                    const top = 3 + Math.random() * 92;
                    el.style.top = top + '%';

                    const size = 1.3 + Math.random() * 2.6;
                    el.style.fontSize = size + 'rem';

                    const delay = Math.random() * 25;
                    el.style.animationDelay = delay + 's';

                    const opacity = 0.15 + Math.random() * 0.35;
                    el.style.opacity = opacity;

                    const rotation = -10 + Math.random() * 20;
                    el.style.transform = `rotate(${rotation}deg)`;

                    const hue = 330 + Math.random() * 30;
                    const lightness = 55 + Math.random() * 30;
                    el.style.color = `hsla(${hue}, 75%, ${lightness}%, 0.45)`;

                    if (index % 5 === 0) {
                        el.style.animationDuration = (22 + Math.random() * 12) + 's';
                    }

                    container.appendChild(el);
                });
            }

            // =============================================
            //  ПАДАЮЩИЕ СЕРДЕЧКИ

                const emojis = ['❤️', '♥️', '💕', '💖', '🌸', '✨'];
                for (let i = 0; i < 25; i++) {
                    const el = document.createElement('span');
                    el.className = 'heart-float';
                    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                    el.style.left = Math.random() * 100 + '%';
                    el.style.fontSize = (0.8 + Math.random() * 1.4) + 'rem';
                    el.style.animationDuration = (15 + Math.random() * 25) + 's';
                    el.style.animationDelay = (Math.random() * 20) + 's';
                    container.appendChild(el);
                }
            }

            //  ИНИЦИАЛИЗАЦИЯ
            // =============================================

            generateCloud(currentCompliments);
            createHearts();

            // =============================================
            //  КНОПКА "ПОКАЗАТЬ ЕЩЁ ЛЮБВИ"
            // =============================================
            const loveBtn = document.getElementById('loveBtn');
            const responseMessage = document.getElementById('responseMessage');
            let clickCount = 0;

            loveBtn.addEventListener('click', function(e) {
                e.preventDefault();
                clickCount++;

                // Смешиваем текущие комплименты с дополнительными
                if (clickCount % 2 === 0) {
                    // Через раз добавляем новые
                    const all = [...currentCompliments, ...extraCompliments];
                    // Убираем дубликаты (для простоты просто перемешиваем)
                    const unique = [...new Set(all)];
                    currentCompliments = unique;
                }

                // Перемешиваем и обновляем облако
                generateCloud(currentCompliments);

                // Показываем ответ
                responseMessage.classList.add('show');
                responseMessage.scrollIntoView({ behavior: 'smooth', block: 'center' });

                if (navigator.vibrate) {
                    navigator.vibrate(20);
                }

                    '✨ Ты сияешь',
                    '💝 Люблю тебя!'
                ];
                loveBtn.innerHTML = `💕 ${messages[clickCount % messages.length]}`;

                // Через 5 секунд убираем ответ
                setTimeout(() => {
                    responseMessage.classList.remove('show');
                }, 4000);
            });

            // =============================================
            //  АДАПТАЦИЯ ПРИ ИЗМЕНЕНИИ РАЗМЕРА ЭКРАНА
            // =============================================
            let resizeTimeout;
            window.addEventListener('resize', function() {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(() => {
                    generateCloud(currentCompliments);
                }, 600);
            });

            console.log('❤️ Облако комплиментов для жены готово!');
        })();
